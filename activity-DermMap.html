<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derma Map Dashboard</title>
    <!-- Using Poppins for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="activity-DermMap.html" class="nav-btn">Derma Map Dashboard</a>
        <a href="activity-PerfectMatch.html" class="nav-btn">Perfect Match Dashboard</a>
        <button id="refresh-btn" class="nav-btn refresh-btn">🔄 Refresh</button>
    </nav>

    <div class="container">
        
        <div class="dash-header">
            Activity Name: Derma Map
        </div>

        <div id="loader" class="loader"></div>

        <div class="dashboard-grid hidden">
            <!-- Left: Small Podium -->
            <div class="dash-panel podium-small">
                <h3>Team Averages</h3>
                <div id="podium-small-content">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Right: QR Code -->
            <div class="dash-panel" style="display: flex; align-items: center; justify-content: center;">
                <img src="qrcode.png" alt="QR Code" style="max-width: 100%; max-height: 200px; border-radius: 8px;">
            </div>
        </div>

        <div class="table-container hidden">
            <h3 style="text-align: center; color: white; margin-bottom: 20px;">Activity Dashboard</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Attendee Name</th>
                        <th>Team Number</th>
                        <th>Total Duration</th>
                        <th>Total Trials</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
